version: '3.8'

services:
  feishu-wiki-sync:
    image: bbblq/feishuwiki2dify:latest
    container_name: feishuwiki2dify
    restart: always
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      - /DATA/AppData/feishuwiki2dify/images:/app/images
      - /DATA/AppData/feishuwiki2dify/config:/app/config
    environment:
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - FEISHU_WIKI_SPACE_ID=${FEISHU_WIKI_SPACE_ID}
      - DIFY_API_KEY=${DIFY_API_KEY}
      - DIFY_DATASET_ID=${DIFY_DATASET_ID}
      - DIFY_BASE_URL=${DIFY_BASE_URL}
      - SYNC_INTERVAL_MINUTES=${SYNC_INTERVAL_MINUTES:-60}
      - RUN_ONCE=${RUN_ONCE:-false}
      - IMAGE_BASE_URL=${IMAGE_BASE_URL:-}
      - TZ=${TZ:-Asia/Shanghai}
    x-casaos:
      envs:
        - container: FEISHU_APP_ID
          description:
            en_us: "Feishu/Lark App ID"
            zh_cn: "飞书自建应用的 App ID"
          default: ""
        - container: FEISHU_APP_SECRET
          description:
            en_us: "Feishu/Lark App Secret"
            zh_cn: "飞书自建应用的 App Secret"
          default: ""
        - container: FEISHU_WIKI_SPACE_ID
          description:
            en_us: "Feishu/Lark Wiki Space ID"
            zh_cn: "飞书知识空间的 Space ID"
          default: ""
        - container: DIFY_API_KEY
          description:
            en_us: "Dify Dataset API Key (starts with dataset-)"
            zh_cn: "Dify 知识库 API 访问凭证 (dataset- 开头)"
          default: ""
        - container: DIFY_DATASET_ID
          description:
            en_us: "Dify Dataset ID"
            zh_cn: "Dify 空知识库 ID"
          default: ""
        - container: DIFY_BASE_URL
          description:
            en_us: "Dify Base API URL (e.g. http://192.168.200.240:3701/v1)"
            zh_cn: "Dify API 服务端点 (例：http://192.168.200.240:3701/v1)"
          default: "http://localhost/v1"
        - container: SYNC_INTERVAL_MINUTES
          description:
            en_us: "Synchronization interval in minutes"
            zh_cn: "自动定时同步时间间隔（单位：分钟）"
          default: "60"
        - container: RUN_ONCE
          description:
            en_us: "Run once and exit (true or false)"
            zh_cn: "是否仅执行一次后退出（true 或 false）"
          default: "false"
        - container: IMAGE_BASE_URL
          description:
            en_us: "Public URL for image server (e.g. http://192.168.200.240:8089). Leave empty to skip image sync."
            zh_cn: "图片服务的公开访问地址 (例：http://192.168.200.240:8089)。留空则不同步图片。"
          default: ""
        - container: TZ
          description:
            en_us: "Timezone (e.g. Asia/Shanghai)"
            zh_cn: "时区设置"
          default: "Asia/Shanghai"

  image-server:
    image: nginx:alpine
    container_name: feishuwiki2dify-images
    restart: always
    ports:
      - "${IMAGE_PORT:-8089}:80"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - /DATA/AppData/feishuwiki2dify/images:/usr/share/nginx/html/images:ro

x-casaos:
  architectures:
    - amd64
    - arm64
  main: feishu-wiki-sync
  author: bbblq
  category: Utility
  description:
    en_us: "Sync Feishu/Lark Wiki documents (with images) to Dify Datasets automatically."
    zh_cn: "自动将飞书知识库文档（含图片）同步至 Dify 知识库。"
  icon: https://img.icons8.com/fluency/512/sync.png
  title:
    en_us: "Feishu Wiki to Dify"
    zh_cn: "飞书知识库同步至 Dify"
  developer: bbblq
  port_map: "8080"
